# yaml-language-server: $schema=https://storage.googleapis.com/coderabbit_public_assets/schema.v2.json

language: "ko-KR"
reviews:
  auto_review:
    enabled: true
    base_branches:
      - main
      - develop
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false

  # 리뷰 포커스 영역
  focus_areas:
    - name: "타입 안전성"
      instructions: |
        - TypeScript strict mode 준수
        - any 타입 사용 최소화
        - 적절한 타입 정의 및 인터페이스 사용

    - name: "React 패턴"
      instructions: |
        - React hooks 올바른 사용 (의존성 배열, useCallback, useMemo)
        - 불필요한 리렌더링 방지
        - 컴포넌트 분리 및 재사용성

    - name: "접근성"
      instructions: |
        - ARIA 속성 적절한 사용
        - 키보드 네비게이션 지원
        - 스크린 리더 호환성

    - name: "보안"
      instructions: |
        - XSS 취약점 점검
        - 민감 정보 노출 방지
        - 사용자 입력 검증

    - name: "성능"
      instructions: |
        - 불필요한 재렌더링 방지
        - 적절한 메모이제이션
        - 비동기 처리 최적화

    - name: "코드 품질"
      instructions: |
        - 코드 중복 최소화
        - 적절한 에러 핸들링
        - 명확한 네이밍

  # 프로젝트 컨텍스트
  project_context: |
    Next.js 16 App Router 기반 프로젝트
    - TypeScript strict mode
    - Tailwind CSS 4 (globals.css 디자인 토큰 사용)
    - Supabase 백엔드
    - Framer Motion 애니메이션
    - TanStack Query, Jotai 상태 관리

  # 자동 리뷰 설정
  auto_reply: true

# 제외할 파일
path_filters:
  excluded:
    - "**/*.md"
    - "**/*.json"
    - "pnpm-lock.yaml"
    - ".next/**"
    - "node_modules/**"
    - "public/**"
